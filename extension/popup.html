<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send to Grain</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --surface: #fffaf2;
        --surface-2: #efe5d7;
        --text: #241d16;
        --muted: #6d5c4d;
        --accent: #2f6f57;
        --border: #d7c7b5;
      }
      html, body {
        margin: 0;
        width: 320px;
        min-width: 320px;
        max-width: 320px;
        background:
          radial-gradient(circle at top left, rgba(47, 111, 87, 0.14), transparent 45%),
          radial-gradient(circle at bottom right, rgba(214, 154, 95, 0.16), transparent 40%),
          var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body { padding: 14px; box-sizing: border-box; overflow-x: hidden; }
      #root { width: 100%; box-sizing: border-box; }
      button {
        font: inherit;
      }
      .popup {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 2px 2px 0;
        min-width: 280px;
      }
      .popup__header {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .popup__logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: #fff7ed;
        border: 1px solid rgba(0, 0, 0, 0.1);
        flex-shrink: 0;
      }
      .popup__logo img {
        display: block;
        width: 28px;
        height: 28px;
      }
      .popup__heading {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .popup__title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      .popup__subtitle {
        font-size: 12px;
        opacity: 0.72;
        line-height: 1.3;
      }
      .popup__card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 10px 12px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.56);
      }
      .popup__row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .popup__label {
        font-size: 12px;
        font-weight: 600;
      }
      .popup__meta {
        font-size: 11px;
        opacity: 0.72;
      }
      .popup__button {
        cursor: pointer;
        font-size: 12px;
        border-radius: 10px;
      }
      .popup__button--primary {
        padding: 9px 10px;
        border: 0;
        background: #2f6f57;
        color: #fff;
        font-weight: 600;
      }
      .popup__button--dark {
        padding: 10px 12px;
        border: 0;
        background: #241d16;
        color: #fff;
        font-weight: 600;
      }
      .popup__button--ghost {
        padding: 8px 10px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        background: transparent;
      }
      .popup__status {
        margin: 0;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 12px;
        line-height: 1.4;
        color: #5f574d;
        background: rgba(95, 87, 77, 0.08);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <section class="popup">
        <header class="popup__header">
          <div class="popup__logo">
            <img src="./icons/grain-32.png" alt="" width="28" height="28" />
          </div>
          <div class="popup__heading">
            <strong class="popup__title">Send to Grain</strong>
            <span class="popup__subtitle">Capture the current tab into Grain.</span>
          </div>
        </header>

        <div class="popup__card" data-connection>
          <div class="popup__row">
            <span class="popup__label">Connection</span>
            <span class="popup__meta" data-connection-state>Not connected</span>
          </div>
          <button class="popup__button popup__button--primary" data-action="connect" type="button">
            Connect from active Grain tab
          </button>
        </div>

        <button class="popup__button popup__button--dark" data-action="current-page" type="button">
          Send current page
        </button>

        <button class="popup__button popup__button--ghost" data-action="disconnect" type="button">
          Forget connection
        </button>

        <p class="popup__status" data-status>
          Open Grain in a signed-in tab, connect once, then send pages and links from here. Captures land on whichever Grain page is open when they apply.
        </p>
      </section>
    </div>
    <script type="module" src="./popup/index.js"></script>
  </body>
</html>
